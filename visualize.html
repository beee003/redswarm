<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RedSwarm — Live Attack Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ---- DATA (injected by redswarm.py) ----
const DATA = window.REDSWARM_DATA || {
  files: [
    { id: "app.py", label: "app.py", loc: 467, imports: ["db.py"] },
    { id: "db.py", label: "db.py", loc: 369, imports: [] },
    { id: "templates/index.html", label: "index.html", loc: 890, imports: [] },
  ],
  findings: [
    { file: "app.py", severity: "critical", title: "EXPOSED SECRET: Hardcoded API Key", discovered_at: 4.5 },
    { file: "app.py", severity: "critical", title: "EXPOSED SECRET: Long hex string", discovered_at: 5.2 },
    { file: "app.py", severity: "medium", title: "LLM CALL: Prompt Injection Risk", discovered_at: 7.0 },
    { file: "app.py", severity: "medium", title: "DEBUG MODE: Flask debug=True", discovered_at: 8.5 },
    { file: "db.py", severity: "medium", title: "LLM CALL: app.py:271", discovered_at: 9.5 },
    { file: "templates/index.html", severity: "low", title: "OUTBOUND: fonts.gstatic.com", discovered_at: 11.0 },
  ],
  totalAgents: 100,
  riskScore: 37,
};

// ---- SETUP ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CX, CY;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });

// ---- COLORS ----
const COLORS = {
  safe:     { fill: '#0d2a0d', stroke: '#1a6b1a', glow: 'rgba(26,107,26,0.15)' },
  targeted: { fill: '#2a2a0d', stroke: '#6b6b1a', glow: 'rgba(107,107,26,0.2)' },
  medium:   { fill: '#2a1a0a', stroke: '#d4820a', glow: 'rgba(212,130,10,0.25)' },
  high:     { fill: '#2a1505', stroke: '#ff6600', glow: 'rgba(255,102,0,0.3)' },
  critical: { fill: '#2a0505', stroke: '#ff2020', glow: 'rgba(255,32,32,0.35)' },
  low:      { fill: '#0d2a1a', stroke: '#22c55e', glow: 'rgba(34,197,94,0.15)' },
};
const SEV_COLORS = { critical: '#ff2020', high: '#ff6600', medium: '#ffcc00', low: '#66ff66' };

// ---- NODES ----
const nodes = DATA.files.map((f, i) => ({
  id: f.id,
  label: f.label || f.id.split('/').pop(),
  loc: f.loc || 100,
  imports: f.imports || [],
  x: CX + (Math.random() - 0.5) * Math.min(W, H) * 0.4,
  y: CY + (Math.random() - 0.5) * Math.min(W, H) * 0.4,
  vx: 0, vy: 0,
  radius: Math.max(14, Math.min(50, Math.sqrt(f.loc || 100) * 1.2)),
  state: 'safe',
  pulsePhase: Math.random() * Math.PI * 2,
  fadeIn: 0,  // 0-1, animates in
  findings: [],
}));

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// Edges
const edges = [];
nodes.forEach(n => {
  const f = DATA.files.find(f => f.id === n.id);
  if (f) f.imports.forEach(imp => {
    if (nodeMap[imp]) edges.push({ from: n, to: nodeMap[imp] });
  });
});

// ---- AGENTS ----
const agents = [];
let agentIdCounter = 0;
const TRAIL_LEN = 80;

function spawnAgent(targetId, findingIdx) {
  const target = nodeMap[targetId];
  if (!target) return;
  const angle = Math.random() * Math.PI * 2;
  const spawnR = Math.max(W, H) * 0.65;
  agents.push({
    id: agentIdCounter++,
    x: CX + Math.cos(angle) * spawnR,
    y: CY + Math.sin(angle) * spawnR,
    vx: 0, vy: 0,
    target,
    findingIdx,
    phase: 'approach',  // approach, orbit, discover, dead
    wanderAngle: Math.random() * Math.PI * 2,
    orbitAngle: Math.random() * Math.PI * 2,
    orbitTime: 0,
    alpha: 1,
    trail: [],
    size: 3 + Math.random() * 1.5,
  });
}

// ---- PARTICLES (explosions) ----
const particles = [];
const MAX_PARTICLES = 600;

function explode(x, y, severity, count) {
  const color = SEV_COLORS[severity] || '#ff0';
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    const life = 50 + Math.random() * 40;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      radius: 1 + Math.random() * 2.5,
      color,
    });
  }
}

// ---- SHOCKWAVES ----
const shockwaves = [];

function shockwave(x, y, color, maxR) {
  shockwaves.push({ x, y, radius: 0, maxRadius: maxR || 150, color, alpha: 1 });
}

// ---- AMBIENT PARTICLES ----
const ambients = [];
for (let i = 0; i < 30; i++) {
  ambients.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    size: 1 + Math.random() * 1.5,
    alpha: 0.1 + Math.random() * 0.15,
  });
}

// ---- SCAN LINES ----
let scanLineY = -10;
let scanLineActive = false;
let scanLineTimer = 0;

// ---- HUD STATE ----
const hud = {
  agentsDeployed: 0,
  agentsActive: 0,
  findings: 0,
  criticals: 0, highs: 0, mediums: 0, lows: 0,
  riskScore: 100,
  targetRiskScore: 100,
  elapsed: 0,
  discoveredTitles: [],  // {title, severity, time}
};

// ---- FORCE LAYOUT ----
function forceLayout(strength) {
  const REP_K = 12000 * strength;
  const SPRING_K = 0.004 * strength;
  const REST = 160;
  const CENTER_K = 0.0008 * strength;

  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const f = REP_K / (dist * dist);
      const fx = (dx / dist) * f;
      const fy = (dy / dist) * f;
      nodes[i].vx += fx; nodes[i].vy += fy;
      nodes[j].vx -= fx; nodes[j].vy -= fy;
    }
  }
  // Springs
  edges.forEach(e => {
    const dx = e.to.x - e.from.x;
    const dy = e.to.y - e.from.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (dist - REST) * SPRING_K;
    const fx = (dx / dist) * f;
    const fy = (dy / dist) * f;
    e.from.vx += fx; e.from.vy += fy;
    e.to.vx -= fx; e.to.vy -= fy;
  });
  // Center
  nodes.forEach(n => {
    n.vx += (CX - n.x) * CENTER_K;
    n.vy += (CY - n.y) * CENTER_K;
  });
  // Integrate
  nodes.forEach(n => {
    n.vx *= 0.9; n.vy *= 0.9;
    n.x += n.vx; n.y += n.vy;
  });
}

// Pre-settle
for (let i = 0; i < 300; i++) forceLayout(1.0);

// ---- TIMELINE ----
// Sort findings: low → medium → high → critical for dramatic build
const sevOrder = { low: 0, medium: 1, high: 2, critical: 3 };
const sortedFindings = [...DATA.findings].sort((a, b) => sevOrder[a.severity] - sevOrder[b.severity]);

// Assign discovery times if not provided — stagger 1.5s apart, start at 4s
sortedFindings.forEach((f, i) => {
  if (!f.discovered_at) f.discovered_at = 4 + i * 1.8;
});

// Pre-spawn agents: 2-4 per finding + scouts
const agentPlan = [];
sortedFindings.forEach((f, i) => {
  const count = f.severity === 'critical' ? 4 : f.severity === 'high' ? 3 : 2;
  for (let j = 0; j < count; j++) {
    agentPlan.push({
      target: f.file,
      findingIdx: i,
      spawnAt: Math.max(0.8, f.discovered_at - 3 - Math.random() * 1.5),
    });
  }
});
// Scout agents (no finding, just orbit and leave)
nodes.forEach(n => {
  for (let i = 0; i < 3; i++) {
    agentPlan.push({
      target: n.id,
      findingIdx: -1,
      spawnAt: 1.0 + Math.random() * 4,
    });
  }
});
agentPlan.sort((a, b) => a.spawnAt - b.spawnAt);

// ---- ANIMATION ----
let startTime = null;
let lastFrame = 0;
const findingsTriggered = new Set();

function update(t) {
  if (!startTime) startTime = t;
  const elapsed = (t - startTime) / 1000;
  const dt = Math.min(t - lastFrame, 33) / 16.67;
  lastFrame = t;
  hud.elapsed = elapsed;

  // Force layout (gentle breathing)
  forceLayout(0.05);

  // Fade in nodes
  nodes.forEach(n => {
    if (elapsed > 0.3) n.fadeIn = Math.min(1, n.fadeIn + 0.03);
  });

  // Spawn agents per timeline
  while (agentPlan.length > 0 && agentPlan[0].spawnAt <= elapsed) {
    const plan = agentPlan.shift();
    spawnAgent(plan.target, plan.findingIdx);
    hud.agentsDeployed++;
  }

  // Trigger findings
  sortedFindings.forEach((f, i) => {
    if (elapsed >= f.discovered_at && !findingsTriggered.has(i)) {
      findingsTriggered.add(i);
      const node = nodeMap[f.file];
      if (node) {
        // Update node state (keep highest severity)
        const sev = sevOrder[f.severity];
        const curSev = sevOrder[node.state] || -1;
        if (sev >= curSev) node.state = f.severity;
        node.findings.push(f);

        // Effects
        const particleCount = f.severity === 'critical' ? 50 : f.severity === 'high' ? 35 : 20;
        explode(node.x, node.y, f.severity, particleCount);
        if (f.severity === 'critical' || f.severity === 'high') {
          shockwave(node.x, node.y, SEV_COLORS[f.severity], f.severity === 'critical' ? 180 : 120);
        }

        // HUD
        hud.findings++;
        if (f.severity === 'critical') { hud.criticals++; hud.targetRiskScore -= 25; }
        else if (f.severity === 'high') { hud.highs++; hud.targetRiskScore -= 15; }
        else if (f.severity === 'medium') { hud.mediums++; hud.targetRiskScore -= 5; }
        else { hud.lows++; hud.targetRiskScore -= 2; }
        hud.targetRiskScore = Math.max(0, hud.targetRiskScore);
        hud.discoveredTitles.unshift({ title: f.title, severity: f.severity, time: elapsed });

        // Trigger discovery on matching agents
        agents.forEach(a => {
          if (a.findingIdx === i && a.phase === 'orbit') {
            a.phase = 'discover';
          }
        });
      }
    }
  });

  // Update agents
  let activeCount = 0;
  agents.forEach(a => {
    if (a.phase === 'dead') return;
    activeCount++;

    // Trail
    a.trail.push({ x: a.x, y: a.y });
    if (a.trail.length > TRAIL_LEN) a.trail.shift();

    if (a.phase === 'approach') {
      const dx = a.target.x - a.x;
      const dy = a.target.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      // Seek
      let seekStr = 0.7;
      if (dist < 100) seekStr *= dist / 100;  // decelerate
      const sx = (dx / dist) * seekStr;
      const sy = (dy / dist) * seekStr;

      // Wander
      a.wanderAngle += (Math.random() - 0.5) * 0.3;
      const wx = Math.cos(a.wanderAngle) * 0.4;
      const wy = Math.sin(a.wanderAngle) * 0.4;

      a.vx += sx + wx;
      a.vy += sy + wy;
      const speed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
      const maxSpeed = 4;
      if (speed > maxSpeed) { a.vx *= maxSpeed / speed; a.vy *= maxSpeed / speed; }
      a.x += a.vx * dt;
      a.y += a.vy * dt;
      a.vx *= 0.96;
      a.vy *= 0.96;

      // Mark node as targeted
      if (a.target.state === 'safe') a.target.state = 'targeted';

      // Arrive
      if (dist < a.target.radius + 8) {
        a.phase = 'orbit';
        a.orbitTime = 0;
      }
    } else if (a.phase === 'orbit') {
      a.orbitAngle += 0.035 + Math.random() * 0.01;
      const oR = a.target.radius + 10 + Math.sin(elapsed * 2) * 4;
      a.x = a.target.x + Math.cos(a.orbitAngle) * oR;
      a.y = a.target.y + Math.sin(a.orbitAngle) * oR * 0.7;
      a.orbitTime += dt / 60;

      // Scouts fade out after orbiting
      if (a.findingIdx === -1 && a.orbitTime > 3) {
        a.alpha -= 0.02;
        if (a.alpha <= 0) a.phase = 'dead';
      }
    } else if (a.phase === 'discover') {
      // Snap to center and dissolve
      a.x += (a.target.x - a.x) * 0.3;
      a.y += (a.target.y - a.y) * 0.3;
      a.size *= 0.93;
      a.alpha -= 0.04;
      if (a.alpha <= 0) a.phase = 'dead';
    }
  });
  hud.agentsActive = activeCount;

  // Lerp risk score
  hud.riskScore += (hud.targetRiskScore - hud.riskScore) * 0.04;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update shockwaves
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.radius += 4 * dt;
    s.alpha = 1 - (s.radius / s.maxRadius);
    if (s.alpha <= 0) shockwaves.splice(i, 1);
  }

  // Ambient particles
  ambients.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
  });

  // Scan line
  scanLineTimer++;
  if (scanLineTimer > 180 && !scanLineActive) {
    scanLineActive = true;
    scanLineY = -5;
    scanLineTimer = 0;
  }
  if (scanLineActive) {
    scanLineY += 3 * dt;
    if (scanLineY > H + 5) scanLineActive = false;
  }
}

function draw(elapsed) {
  // Layer 0: Fade (creates trails)
  ctx.fillStyle = 'rgba(10, 10, 10, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Ambient particles
  ambients.forEach(p => {
    ctx.fillStyle = `rgba(0, 255, 65, ${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Scan line
  if (scanLineActive) {
    ctx.strokeStyle = 'rgba(0, 255, 65, 0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, scanLineY);
    ctx.lineTo(W, scanLineY);
    ctx.stroke();
  }

  // Layer 1: Edges
  ctx.lineWidth = 1;
  edges.forEach(e => {
    const a = Math.min(e.from.fadeIn, e.to.fadeIn);
    if (a <= 0) return;
    ctx.strokeStyle = `rgba(40, 80, 40, ${0.25 * a})`;
    ctx.beginPath();
    const mx = (e.from.x + e.to.x) / 2;
    const my = (e.from.y + e.to.y) / 2;
    // Perpendicular offset for curve
    const dx = e.to.x - e.from.x;
    const dy = e.to.y - e.from.y;
    const cx = mx + dy * 0.1;
    const cy = my - dx * 0.1;
    ctx.moveTo(e.from.x, e.from.y);
    ctx.quadraticCurveTo(cx, cy, e.to.x, e.to.y);
    ctx.stroke();
  });

  // Layer 2: Agent trails
  agents.forEach(a => {
    if (a.phase === 'dead' || a.trail.length < 2) return;
    for (let k = 1; k < a.trail.length; k++) {
      const t = k / a.trail.length;
      const alpha = t * 0.6 * a.alpha;
      ctx.strokeStyle = `rgba(255, 40, 40, ${alpha})`;
      ctx.lineWidth = 2.5 * t;
      ctx.beginPath();
      ctx.moveTo(a.trail[k - 1].x, a.trail[k - 1].y);
      ctx.lineTo(a.trail[k].x, a.trail[k].y);
      ctx.stroke();
    }
  });

  // Layer 3: Agent cores
  agents.forEach(a => {
    if (a.phase === 'dead') return;
    // Glow
    const grad = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, 14);
    grad.addColorStop(0, `rgba(255, 60, 60, ${0.9 * a.alpha})`);
    grad.addColorStop(0.3, `rgba(255, 30, 30, ${0.5 * a.alpha})`);
    grad.addColorStop(1, `rgba(255, 0, 0, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(a.x, a.y, 14, 0, Math.PI * 2);
    ctx.fill();
    // Core
    ctx.fillStyle = `rgba(255, 80, 80, ${a.alpha})`;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Layer 4: Nodes
  nodes.forEach(n => {
    if (n.fadeIn <= 0) return;
    const scale = n.fadeIn;
    const r = n.radius * scale;
    const c = COLORS[n.state] || COLORS.safe;

    // Glow (for non-safe nodes)
    if (n.state !== 'safe' && n.state !== 'targeted') {
      n.pulsePhase += 0.05;
      const glowAlpha = 0.15 + 0.1 * Math.sin(n.pulsePhase);
      const glowR = r * (1.8 + 0.4 * Math.sin(n.pulsePhase * 1.3));
      const gGrad = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, glowR);
      gGrad.addColorStop(0, c.glow);
      gGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gGrad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Node body
    ctx.fillStyle = c.fill;
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Label
    ctx.fillStyle = `rgba(160, 160, 160, ${0.8 * n.fadeIn})`;
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y + r + 18);
  });

  // Layer 5: Shockwaves
  shockwaves.forEach(s => {
    ctx.strokeStyle = `rgba(${hexToRgb(s.color)}, ${s.alpha * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.stroke();
  });

  // Layer 5b: Explosion particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  });

  // Layer 6: HUD (drawn fresh, not faded)
  drawHUD(elapsed);
}

function drawHUD(elapsed) {
  const x = 24, y = 28;
  const lh = 20;

  // Background panel
  ctx.fillStyle = 'rgba(10, 10, 10, 0.85)';
  ctx.fillRect(x - 8, y - 18, 260, 210);
  ctx.strokeStyle = 'rgba(0, 255, 65, 0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - 8, y - 18, 260, 210);

  ctx.font = '15px "Courier New", monospace';
  ctx.textAlign = 'left';

  // Title
  ctx.fillStyle = '#00ff41';
  ctx.fillText('REDSWARM v0.1', x, y);

  ctx.fillStyle = 'rgba(0, 255, 65, 0.3)';
  ctx.fillText('─'.repeat(22), x, y + lh);

  // Stats
  let row = y + lh * 2;
  ctx.font = '12px "Courier New", monospace';

  ctx.fillStyle = '#668866';
  ctx.fillText(`AGENTS DEPLOYED:`, x, row);
  ctx.fillStyle = '#00ff41';
  ctx.fillText(`${hud.agentsDeployed}`, x + 170, row);

  row += lh;
  ctx.fillStyle = '#668866';
  ctx.fillText(`AGENTS ACTIVE:`, x, row);
  ctx.fillStyle = hud.agentsActive > 0 ? '#00ff41' : '#335533';
  ctx.fillText(`${hud.agentsActive}`, x + 170, row);

  row += lh;
  ctx.fillStyle = '#668866';
  ctx.fillText(`FINDINGS:`, x, row);
  ctx.fillStyle = hud.findings > 0 ? '#ff6644' : '#335533';
  ctx.fillText(`${hud.findings}`, x + 170, row);

  // Severity breakdown
  if (hud.criticals > 0) {
    row += lh;
    ctx.fillStyle = '#ff2020'; ctx.fillText(`  CRITICAL: ${hud.criticals}`, x, row);
  }
  if (hud.highs > 0) {
    row += lh;
    ctx.fillStyle = '#ff6600'; ctx.fillText(`  HIGH:     ${hud.highs}`, x, row);
  }
  if (hud.mediums > 0) {
    row += lh;
    ctx.fillStyle = '#ffcc00'; ctx.fillText(`  MEDIUM:   ${hud.mediums}`, x, row);
  }
  if (hud.lows > 0) {
    row += lh;
    ctx.fillStyle = '#66ff66'; ctx.fillText(`  LOW:      ${hud.lows}`, x, row);
  }

  // Risk score
  row += lh + 4;
  ctx.fillStyle = '#668866';
  ctx.fillText(`RISK SCORE:`, x, row);
  const score = Math.round(hud.riskScore);
  const scoreColor = score >= 80 ? '#22c55e' : score >= 50 ? '#eab308' : '#ef4444';
  ctx.fillStyle = scoreColor;
  ctx.font = '14px "Courier New", monospace';
  ctx.fillText(`${score}/100`, x + 130, row);

  // Risk bar
  row += 8;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(x, row, 200, 6);
  const barW = (score / 100) * 200;
  ctx.fillStyle = scoreColor;
  ctx.fillRect(x, row, barW, 6);

  // Elapsed
  row += lh;
  ctx.font = '11px "Courier New", monospace';
  ctx.fillStyle = '#335533';
  const mins = Math.floor(elapsed / 60);
  const secs = Math.floor(elapsed % 60);
  ctx.fillText(`${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`, x, row);

  // Bottom-right: discovered findings feed
  const feedX = W - 24;
  let feedY = H - 30;
  ctx.textAlign = 'right';
  ctx.font = '11px "Courier New", monospace';

  const visibleTitles = hud.discoveredTitles.filter(d => elapsed - d.time < 8);
  visibleTitles.slice(0, 6).forEach(d => {
    const age = elapsed - d.time;
    const fadeAlpha = age < 6 ? 0.9 : 0.9 * (1 - (age - 6) / 2);
    ctx.fillStyle = `rgba(10, 10, 10, ${fadeAlpha * 0.8})`;
    ctx.fillRect(feedX - 400, feedY - 13, 400, 18);
    ctx.fillStyle = SEV_COLORS[d.severity] || '#fff';
    ctx.globalAlpha = fadeAlpha;
    ctx.fillText(`[${d.severity.toUpperCase()}] ${d.title}`, feedX, feedY);
    ctx.globalAlpha = 1;
    feedY -= 22;
  });
  ctx.textAlign = 'left';

  // Scan complete message
  const lastFinding = sortedFindings[sortedFindings.length - 1];
  if (lastFinding && elapsed > lastFinding.discovered_at + 4) {
    const completeText = 'SCAN COMPLETE';
    const chars = Math.min(completeText.length, Math.floor((elapsed - lastFinding.discovered_at - 4) * 8));
    ctx.font = '18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ff41';
    ctx.fillText(completeText.substring(0, chars), CX, H - 40);
    // Blinking cursor
    if (chars < completeText.length && Math.floor(elapsed * 3) % 2 === 0) {
      const textW = ctx.measureText(completeText.substring(0, chars)).width;
      ctx.fillRect(CX + textW / 2 + 2, H - 55, 10, 18);
    }
    ctx.textAlign = 'left';
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

// ---- MAIN LOOP ----
function frame(t) {
  update(t);
  draw(hud.elapsed);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
